# Spec de exemplo para: python new_squad.py --from scaffolding/spec.example.yaml
# Copie, renomeie e edite para criar o seu squad.
# (o squads/osint_investigador/ do repo foi gerado por um spec como este)
name: due-diligence-fornecedor
description: Due diligence auditável de fornecedor com citação rastreável de fonte.
termination: >-
  o parecer de due diligence é emitido cobrindo cadastro, saúde financeira e
  compliance, toda asserção com fonte rotulada, e "nao_consta" registrado para
  o que não se verificou
context: audax            # audax | externo | pessoal
profile: agente-ia
owner: Eric
max_iterations: 20        # verificação multi-hop; teto maior, com wall de tempo
max_execution_seconds: 120
max_cost_per_run_usd: 1.20
qa_reflection_rounds_max: 2
output_blocked_if:
  - assercao_sem_fonte

agents:
  - name: AG1
    role: Cadastro e situação fiscal (Receita, certidões)
    sources: [ReceitaFederal, Certidoes]
    model_tier: powerful
  - name: AG2
    role: Saúde financeira e histórico de pagamento
    sources: [Serasa, SQL]
    model_tier: powerful
  - name: AG3
    role: Compliance e mídia negativa
    sources: [Judiciario, Web]
    model_tier: fast
