name: squad-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Validar manifestos SQUAD.md contra o schema
        run: python scripts/validate_squads.py
      - name: Testes
        run: pytest -q
      - name: Smoke E2E (squad de exemplo, checkpoint aprovado)
        run: python run.py --approve
